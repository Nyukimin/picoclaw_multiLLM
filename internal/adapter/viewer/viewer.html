<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PicoClaw Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b14;--bg2:#12121f;--card:rgba(255,255,255,.035);
  --border:rgba(255,255,255,.07);--t1:#e2e8f0;--t2:#94a3b8;--t3:#4a5568;
  --mio:#f472b6;--shiro:#22d3ee;--c1:#fb923c;--c2:#818cf8;--c3:#a78bfa;
  --user:#94a3b8;--ok:#4ade80;--err:#f87171;
}
body{
  background:var(--bg);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* header */
header{
  background:rgba(11,11,20,.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo span:first-child{font-size:22px}
.stat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.dot.off{background:var(--err);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* main */
main{flex:1;overflow-y:auto;padding:20px 0}
#chat{max-width:780px;margin:0 auto;padding:0 24px}

/* message row */
.msg{display:flex;gap:12px;margin-bottom:4px;animation:fadeSlide .35s ease}
.msg+.sys,.sys+.msg{margin-top:16px}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;position:relative;
}
.av::after{
  content:'';position:absolute;inset:-2px;border-radius:50%;
  border:2px solid currentColor;opacity:.35;
}

.mb{flex:1;min-width:0}
.mh{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.an{font-weight:700;font-size:13px}
.dir{color:var(--t3);font-size:12px}
.tm{color:var(--t3);font-size:11px;margin-left:auto;white-space:nowrap}
.mc{
  background:var(--card);border:1px solid var(--border);
  border-radius:2px 12px 12px 12px;padding:10px 14px;
  font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;
  max-height:400px;overflow-y:auto;
}
.mc code{background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12.5px}
.mc pre{background:rgba(0,0,0,.35);border-radius:6px;padding:10px 12px;margin:6px 0;overflow-x:auto}
.mc pre code{background:none;padding:0}
.mc strong{color:#fff}
.mc h2,.mc h3{font-size:13.5px;color:var(--t2);margin:8px 0 4px;font-weight:600}

/* copy button */
.mb{position:relative}
.cp{
  position:absolute;top:0;right:0;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:4px;padding:2px 6px;cursor:pointer;
  font-size:11px;color:var(--t3);opacity:0;transition:opacity .15s;
  line-height:1.4;
}
.mb:hover .cp{opacity:1}
.cp:hover{background:rgba(255,255,255,.12);color:var(--t2)}
.cp.ok{color:var(--ok)}

/* system / routing line */
.sys{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin:12px 0;animation:fadeSlide .3s ease;
}
.sl{flex:1;height:1px;background:var(--border);max-width:100px}
.sb{
  font-size:11.5px;color:var(--t3);
  background:var(--card);border:1px solid var(--border);
  padding:3px 14px;border-radius:10px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.rt{font-weight:700;padding:1px 6px;border-radius:3px;font-size:11px;background:rgba(255,255,255,.06)}

/* thinking bubble */
.thinking .mc{
  background:rgba(244,114,182,.04);border-color:rgba(244,114,182,.12);
  color:var(--t2);font-style:italic;
}
.thinking .mc::before{
  content:'\u{1f4ad} ';font-style:normal;
}

/* empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:70vh;color:var(--t3);text-align:center;gap:6px;
}
.empty b{font-size:42px;opacity:.4;margin-bottom:8px}

/* scrollbar */
main::-webkit-scrollbar{width:6px}
main::-webkit-scrollbar-track{background:transparent}
main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.mc::-webkit-scrollbar{width:4px}
.mc::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* counter */
.ctr{
  position:fixed;bottom:84px;right:24px;
  background:rgba(11,11,20,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-size:12px;color:var(--t2);
  display:flex;align-items:center;gap:8px;
}
.ctr span{font-weight:700;color:var(--t1)}

/* input bar */
.input-bar{
  flex-shrink:0;
  background:rgba(11,11,20,.92);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:12px 24px 14px;
}
.input-wrap{
  max-width:780px;margin:0 auto;
  display:flex;align-items:flex-end;gap:10px;
}
.input-wrap textarea{
  flex:1;resize:none;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:12px;
  padding:10px 16px;
  color:var(--t1);font-size:16px;line-height:1.5;
  font-family:inherit;
  outline:none;
  min-height:42px;max-height:120px;
  transition:border-color .2s,box-shadow .2s;
}
.input-wrap textarea::placeholder{color:var(--t3)}
.input-wrap textarea:focus{
  border-color:rgba(244,114,182,.4);
  box-shadow:0 0 0 3px rgba(244,114,182,.08);
}
.send-btn{
  width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--mio),#c084fc);
  color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s,transform .15s;
  flex-shrink:0;
}
.send-btn:hover{transform:scale(1.08)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.35;cursor:default;transform:none}
</style>
</head>
<body>
<header>
  <div class="logo"><span>&#x1f43e;</span><span>PicoClaw Live</span></div>
  <div class="stat">
    <div class="dot" id="dot"></div>
    <span id="stxt">Connecting...</span>
  </div>
</header>
<main><div id="chat">
  <div class="empty" id="empty">
    <b>&#x1f43e;</b>
    <div style="font-size:15px">Waiting for messages...</div>
    <div style="font-size:12px;margin-top:4px">LINE / CLI からメッセージを送ると、ここにリアルタイムで表示されます</div>
  </div>
</div></main>
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="inp" rows="1" placeholder="Mio にメッセージを送る..." autocomplete="off"></textarea>
    <button class="send-btn" id="sendBtn" title="Send">&#x27A4;</button>
  </div>
</div>
<div class="ctr" id="ctr" style="display:none">Messages: <span id="cnt">0</span></div>
<script>
'use strict';
const BT = String.fromCharCode(96);  // backtick for regex
const A = {
  user:   {c:'#94a3b8', l:'User',   e:'\u{1f464}'},
  mio:    {c:'#f472b6', l:'Mio',    e:'\u{1f338}'},
  shiro:  {c:'#22d3ee', l:'Shiro',  e:'\u26a1'},
  coder1: {c:'#fb923c', l:'Aka',    e:'\u{1f534}'},
  coder2: {c:'#818cf8', l:'Ao',     e:'\u{1f535}'},
  coder3: {c:'#a78bfa', l:'Claude', e:'\u{1f7e3}'},
  system: {c:'#475569', l:'System', e:'\u2699\ufe0f'},
};
const RC = {
  CHAT:'#f472b6', OPS:'#22d3ee', CODE:'#fb923c',
  CODE1:'#fb923c', CODE2:'#818cf8', CODE3:'#a78bfa',
  PLAN:'#4ade80', ANALYZE:'#fbbf24', RESEARCH:'#34d399',
};

function ag(n) { return A[(n||'').toLowerCase()] || A.system; }

function ftime(ts) {
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  } catch(e) { return ''; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(s) {
  let h = esc(s);
  // code blocks: ```lang\n...\n```
  const cbRe = new RegExp(BT+'{3}(\\w*)\\n([\\s\\S]*?)'+BT+'{3}', 'g');
  h = h.replace(cbRe, '<pre><code>$2</code></pre>');
  // inline code
  const icRe = new RegExp(BT+'([^'+BT+' ]+)'+BT, 'g');
  h = h.replace(icRe, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  return h;
}

let msgCount = 0;
const chat = document.getElementById('chat');
const ctr  = document.getElementById('ctr');
const cnt  = document.getElementById('cnt');

// Thinking bubble tracking: jobID -> {el, textEl, raw}
const thinkingBubbles = {};

function addMsg(ev) {
  const em = document.getElementById('empty');
  if (em) em.remove();
  if (ev.type === 'routing.decision') { addSys(ev); return; }
  if (ev.type === 'agent.thinking')   { addThinking(ev); return; }
  if (ev.type === 'agent.response')   { removeThinking(ev.job_id); }
  if (ev.type === 'agent.start' && ev.content === '\u8003\u3048\u4e2d...') return; // skip "考え中..."

  const f = ag(ev.from), t = ev.to ? ag(ev.to) : null;
  const dir = t && ev.to
    ? '<span class="dir">\u2192 ' + t.e + ' ' + t.l + '</span>' : '';
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML =
    '<div class="av" style="background:' + f.c + '18;color:' + f.c + '">' + f.e + '</div>' +
    '<div class="mb"><div class="mh">' +
      '<span class="an" style="color:' + f.c + '">' + f.l + '</span>' + dir +
      '<span class="tm">' + ftime(ev.timestamp) + '</span>' +
    '</div><button class="cp" onclick="copyMsg(this)">Copy</button>' +
    '<div class="mc">' + fmt(ev.content) + '</div></div>';
  el.querySelector('.mc').dataset.raw = ev.content;
  chat.appendChild(el);
  bump();
}

function addThinking(ev) {
  const jid = ev.job_id || '_';
  let b = thinkingBubbles[jid];
  if (!b) {
    // Create thinking bubble
    const f = ag(ev.from);
    const el = document.createElement('div');
    el.className = 'msg thinking';
    const textEl = document.createElement('div');
    textEl.className = 'mc';
    el.innerHTML =
      '<div class="av" style="background:' + f.c + '18;color:' + f.c + '">' + f.e + '</div>' +
      '<div class="mb"><div class="mh">' +
        '<span class="an" style="color:' + f.c + '">' + f.l + '</span>' +
        '<span class="tm">' + ftime(ev.timestamp) + '</span>' +
      '</div></div>';
    el.querySelector('.mb').appendChild(textEl);
    chat.appendChild(el);
    b = {el: el, textEl: textEl, raw: ''};
    thinkingBubbles[jid] = b;
  }
  b.raw += ev.content;
  b.textEl.textContent = b.raw;
  scrollToBottom();
}

function removeThinking(jid) {
  const b = thinkingBubbles[jid || '_'];
  if (b) {
    b.el.remove();
    delete thinkingBubbles[jid || '_'];
  }
}

function addSys(ev) {
  const el = document.createElement('div');
  el.className = 'sys';
  const rc = RC[ev.route] || '#94a3b8';
  el.innerHTML =
    '<div class="sl"></div>' +
    '<div class="sb">\u2699\ufe0f <span class="rt" style="color:' + rc + '">' +
      esc(ev.route || '?') + '</span> ' + esc(ev.content) + '</div>' +
    '<div class="sl"></div>';
  chat.appendChild(el);
  bump();
}

const mainEl = document.querySelector('main');
let userScrolledUp = false;

mainEl.addEventListener('scroll', () => {
  userScrolledUp = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight > 300;
});

function scrollToBottom() {
  if (!userScrolledUp) mainEl.scrollTop = mainEl.scrollHeight;
}

function bump() {
  msgCount++;
  cnt.textContent = msgCount;
  ctr.style.display = 'flex';
  scrollToBottom();
}

function copyMsg(btn) {
  const mc = btn.parentElement.querySelector('.mc');
  const text = mc.dataset.raw || mc.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'OK';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
  });
}

/* input handling */
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
let sending = false;

function autoResize() {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
}
inp.addEventListener('input', autoResize);

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

function send() {
  const text = inp.value.trim();
  if (!text || sending) return;
  sending = true;
  sendBtn.disabled = true;
  inp.disabled = true;

  fetch('/viewer/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text}),
  })
  .then(r => {
    if (!r.ok) throw new Error('send failed');
    inp.value = '';
    autoResize();
  })
  .catch(err => console.error(err))
  .finally(() => {
    sending = false;
    sendBtn.disabled = false;
    inp.disabled = false;
    inp.focus();
  });
}

function connect() {
  const es = new EventSource('/viewer/events');
  const dot = document.getElementById('dot');
  const stxt = document.getElementById('stxt');
  es.onopen = () => { dot.className = 'dot'; stxt.textContent = 'Connected'; };
  es.onmessage = e => {
    try { addMsg(JSON.parse(e.data)); }
    catch(err) { console.error(err); }
  };
  es.onerror = () => {
    dot.className = 'dot off'; stxt.textContent = 'Reconnecting...';
    es.close(); setTimeout(connect, 3000);
  };
}
connect();
</script>
</body>
</html>
