# PicoClaw v4 設定サンプル
# このファイルをコピーして config.yaml として使用
# API キーは環境変数から読み込み推奨（ファイルに平文保存しない）

server:
  host: "0.0.0.0"
  port: 18790

# Ollama 設定（Mio/Shiro/IdleChat共通モデル）
ollama:
  base_url: "http://localhost:11434"
  model: "picoclaw-v1"  # 全Agent共通モデル

# Claude API (Coder3) - APIキーは ANTHROPIC_API_KEY 環境変数で設定
claude:
  model: "claude-sonnet-4-20250514"

# DeepSeek API (Coder1) - APIキーは DEEPSEEK_API_KEY 環境変数で設定
deepseek:
  model: "deepseek-chat"

# OpenAI API (Coder2) - APIキーは OPENAI_API_KEY 環境変数で設定
openai:
  model: "gpt-4o-mini"

# LINE Messaging API - 認証情報は環境変数で設定推奨
# LINE_CHANNEL_SECRET, LINE_CHANNEL_TOKEN
line:
  channel_secret: ""
  access_token: ""

# セッション設定
session:
  storage_dir: "./sessions"

# Worker 実行設定
worker:
  auto_commit: true
  commit_message_prefix: "[Worker Auto-Commit]"
  command_timeout: 300     # 秒
  git_timeout: 30          # 秒
  stop_on_error: true
  workspace: "."
  protected_patterns:
    - ".env*"
    - "*credentials*"
    - "*.key"
    - "*.pem"
  action_on_protected: "error"  # "error" / "skip" / "log"
  show_execution_summary: true
  parallel_execution: false     # v4: true で Type-Based Phased Execution
  max_parallelism: 4            # v4: 並列度上限

# ログ設定
log:
  level: "info"
  format: "json"

# === v4.0 分散実行設定 ===
# enabled: true で分散モードを有効化
# 各AgentのTransport設定: "local"（同一プロセス）or "ssh"（リモート実行）
distributed:
  enabled: false
  transports:
    Mio:
      type: "local"
    Shiro:
      type: "local"
    Coder1:
      type: "local"
    Coder2:
      type: "local"
    Coder3:
      type: "ssh"
      remote_host: "192.168.1.100:22"
      remote_user: "picoclaw"
      ssh_key_path: "~/.ssh/id_ed25519_picoclaw"
      strict_host_key: true  # 本番: true（known_hosts必須）、開発: false（Insecure許可）

# === v4.0 Agent間雑談モード ===
idle_chat:
  enabled: false
  participants:
    - "Mio"
    - "Shiro"
    - "Aka"
    - "Ao"
    - "Gin"
  interval_min: 30       # アイドル時間（分）
  max_turns: 10          # 1回の雑談最大ターン数
  temperature: 0.9       # 雑談時の温度
